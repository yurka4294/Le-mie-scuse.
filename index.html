<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Kamu ❤️</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f5f5f5;
    text-align:center;
}

#question{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

h1{
    margin-bottom:30px;
}

button{
    padding:15px 30px;
    margin:10px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.gallery{
    display:none;
    padding:30px;
}

.gallery h2{
    margin-bottom:30px;
}

.gallery-container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.gallery img{
    width:250px;
    height:250px;
    object-fit:cover;
    border-radius:15px;
    cursor:pointer;
    transition:0.3s;
}

.gallery img:hover{
    transform:scale(1.05);
}

.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    z-index:999;
}

.modal img{
    max-width:90%;
    max-height:90%;
    margin-top:2%;
}

.close{
    position:absolute;
    top:20px;
    right:35px;
    color:white;
    font-size:40px;
    cursor:pointer;
}

.footer{
    margin-top:40px;
    color:#666;
}

</style>
</head>

<body>

<div id="question">
    <h1>Aku minta maaf, dimaafkan tidak?</h1>

    <button onclick="showGallery()">
        Dimaafkan
    </button>

    <button onclick="showGallery()">
        Dimaafkan Sayangku ❤️
    </button>
</div>

<div class="gallery" id="gallery">

    <h2>Terima kasih sudah membuka halaman ini ❤️</h2>

    <div class="gallery-container">

        <img src="foto1.jpg" onclick="openImg(this.src)">
        <img src="foto2.jpg" onclick="openImg(this.src)">
        <img src="foto3.jpg" onclick="openImg(this.src)">
        <img src="foto4.jpg" onclick="openImg(this.src)">
        <img src="foto5.jpg" onclick="openImg(this.src)">

    </div>

    <div class="footer">
        Kenangan yang selalu ingin aku jaga.
    </div>

</div>

<div class="modal" id="modal">

    <span class="close" onclick="closeImg()">&times;</span>

    <img id="modalImg">

</div>

<script>

function showGallery(){
    document.getElementById("question").style.display="none";
    document.getElementById("gallery").style.display="block";
}

function openImg(src){
    document.getElementById("modal").style.display="block";
    document.getElementById("modalImg").src=src;
}

function closeImg(){
    document.getElementById("modal").style.display="none";
}

document.getElementById("modal").addEventListener("click", function(e){
    if(e.target === this){
        closeImg();
    }
});

</script>

</body>
</html>
